<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara — A Quiet Place</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- CURSOR -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- ══════════════════════
     PHASE 1 — CINEMATIC INTRO
══════════════════════ -->
<div id="intro-screen">
  <canvas id="intro-canvas"></canvas>
  <div id="intro-grain"></div>
  <div id="intro-vignette"></div>

  <!-- ONE sentence lives here at a time -->
  <div id="sentence-stage">
    <p id="sentence-text"></p>
  </div>

  <!-- thin progress line at bottom -->
  <div id="intro-bar"><div id="intro-bar-fill"></div></div>
</div>

<!-- ══════════════════════
     PHASE 2 — SARA HOME
══════════════════════ -->
<div id="sara-home" class="hidden">
  <canvas id="home-canvas"></canvas>
  <div id="home-orbs">
    <div class="orb" id="orb1"></div>
    <div class="orb" id="orb2"></div>
    <div class="orb" id="orb3"></div>
  </div>

  <div id="home-card">
    <!-- Avatar -->
    <div id="avatar-wrap">
      <svg class="avatar-ring-svg" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="62" fill="none"
          stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle id="avatar-arc" cx="70" cy="70" r="62"
          fill="none" stroke="rgba(255,255,255,0.45)"
          stroke-width="1.2" stroke-dasharray="60 330"
          stroke-linecap="round"/>
      </svg>
      <div id="avatar-face">◈</div>
      <div id="avatar-online"></div>
    </div>

    <p id="home-eyebrow">MEET SARA</p>
    <h1 id="home-headline">Someone to<br><em>talk to.</em></h1>
    <p id="home-desc">A safe, private space to share whatever's on your mind.</p>

    <div id="home-status">
      <span id="home-pulse"></span>
      <span id="home-status-label">Available now · Listening with care</span>
    </div>

    <button id="say-hello-btn">
      Begin conversation
      <span id="btn-arrow">↗</span>
    </button>

    <p id="home-legal">Completely private &nbsp;·&nbsp; No account needed</p>
  </div>
</div>

<!-- ══════════════════════
     PHASE 3 — CHAT
══════════════════════ -->
<div id="chat-interface" class="hidden">
  <canvas id="chat-canvas"></canvas>
  <div id="chat-orbs">
    <div class="chat-orb" id="corb1"></div>
    <div class="chat-orb" id="corb2"></div>
  </div>

  <div id="chat-window">

    <!-- Header -->
    <header id="chat-header">
      <div id="ch-avatar-wrap">
        <div id="ch-avatar">◈</div>
        <div id="ch-online-dot"></div>
      </div>
      <div id="ch-info">
        <div id="ch-name">Sara</div>
        <div id="ch-status">
          <span id="ch-status-dot"></span>
          <span id="ch-status-label">Listening</span>
        </div>
      </div>
      <div id="ch-mood">
        <span id="mood-icon">🌿</span>
        <span id="mood-word">Calm</span>
      </div>
    </header>

    <!-- Messages scroll area -->
    <div id="messages-area">
      <div class="day-divider"><span>Today</span></div>
    </div>

    <!-- Sara thinking wave — shown while fetching -->
    <div id="thinking-wave" class="hidden-wave">
      <div class="tw-dot"></div>
      <div class="tw-dot"></div>
      <div class="tw-dot"></div>
    </div>

    <!-- Mood shortcut chips -->
    <div id="mood-chips">
      <button class="mood-chip" data-msg="I'm feeling really anxious today">😶 Anxious</button>
      <button class="mood-chip" data-msg="I just need to vent right now">💬 Vent</button>
      <button class="mood-chip" data-msg="I'm feeling really lonely">🌙 Lonely</button>
      <button class="mood-chip" data-msg="I had a really rough day">🍂 Rough day</button>
      <button class="mood-chip" data-msg="I can't stop overthinking everything">🌀 Overthinking</button>
      <button class="mood-chip" data-msg="I'm feeling really grateful today">🌻 Grateful</button>
    </div>

    <!-- Input row -->
    <div id="input-area">
      <textarea id="chat-input" placeholder="Say anything…" rows="1" autocomplete="off" spellcheck="false"></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="12 5 19 12 12 19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<!-- ══════════════════════
     FAREWELL
══════════════════════ -->
<div id="farewell-overlay" class="hidden">
  <div id="farewell-content">
    <div id="farewell-glyph">◈</div>
    <h2>Take all the time you need.</h2>
    <p><em>I'll be right here whenever you return.</em></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
