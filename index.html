<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna - A Quiet Place</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="scroll-container">
        <div class="ui-container">
            <div class="text-section" id="sec-0">
                <h1>When the world gets<br><em>a little too loud.</em></h1>
            </div>
            
            <div class="text-section" id="sec-1">
                <h1>And you just need<br>someone to listen.</h1>
            </div>
            
            <div class="text-section" id="sec-2">
                <h1>No judgment.<br><em>No pressure.</em></h1>
            </div>
            
            <div class="text-section final-section" id="sec-3">
                <p class="subtitle">MEET LUNA</p>
                <h1>Someone to<br>talk to.</h1>
                <p class="description">A quiet place to share what's on your mind.</p>
                <button class="chat-btn">Say hello</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
