<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Sara - A Quiet Place</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div id="intro-container" class="ui-container">
        <div class="text-section" id="sec-0">
            <h1>When the world gets<br><em>a little too loud.</em></h1>
        </div>
        
        <div class="text-section" id="sec-1">
            <h1>And you just need<br>someone to listen.</h1>
        </div>
        
        <div class="text-section" id="sec-2">
            <h1>No judgment.<br><em>No pressure.</em></h1>
        </div>
        
        <div class="text-section final-section" id="sec-3">
            <p class="subtitle">MEET SARA</p>
            <h1>Someone to<br>talk to.</h1>
            <p class="description">A quiet place to share what's on your mind.</p>
            <button id="say-hello-btn" class="chat-btn">Say hello</button>
        </div>
    </div>

    <div id="chat-interface" class="hidden">
        <div class="chat-window">
            <div class="chat-header">
                <div class="avatar">S</div>
                <div class="header-info">
                    <h2>Sara</h2>
                    <p>Online • Listening with love</p>
                </div>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="farewell-overlay">
        <h2>Take all the time you need.<br><em>I'll be right here waiting for you.</em> 🌸</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
